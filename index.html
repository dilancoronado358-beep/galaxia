<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Universo de Partículas con Manos</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#mensaje{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:white;
text-shadow:0 0 30px cyan;
pointer-events:none;

}

#debugCam{

position:fixed;
right:20px;
bottom:20px;
width:240px;
border-radius:10px;
border:2px solid cyan;

}

</style>

</head>

<body>

<video id="video" playsinline style="display:none"></video>
<canvas id="debugCam"></canvas>

<div id="mensaje"></div>

<script>

const PARTICLES = 20000

let scene,camera,renderer
let geometry,points
let positions,targetPositions

let handX=0
let handY=0

let figura=-1

init3D()
initHands()
animate()

function init3D(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=200

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

geometry=new THREE.BufferGeometry()

positions=new Float32Array(PARTICLES*3)
targetPositions=new Float32Array(PARTICLES*3)

for(let i=0;i<PARTICLES;i++){

positions[i*3]=(Math.random()-0.5)*400
positions[i*3+1]=(Math.random()-0.5)*400
positions[i*3+2]=(Math.random()-0.5)*400

targetPositions[i*3]=positions[i*3]
targetPositions[i*3+1]=positions[i*3+1]
targetPositions[i*3+2]=positions[i*3+2]

}

geometry.setAttribute('position',new THREE.BufferAttribute(positions,3))

const material=new THREE.PointsMaterial({
size:1.4,
color:0xffffff
})

points=new THREE.Points(geometry,material)

scene.add(points)

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

}

function animate(){

requestAnimationFrame(animate)

for(let i=0;i<PARTICLES*3;i++){

positions[i]+= (targetPositions[i]-positions[i])*0.02

}

geometry.attributes.position.needsUpdate=true

points.rotation.y += handX*0.05
points.rotation.x += handY*0.05

renderer.render(scene,camera)

}

function explosion(){

for(let i=0;i<PARTICLES;i++){

let power=Math.random()*300

let theta=Math.random()*Math.PI*2
let phi=Math.acos(2*Math.random()-1)

targetPositions[i*3]=power*Math.sin(phi)*Math.cos(theta)
targetPositions[i*3+1]=power*Math.sin(phi)*Math.sin(theta)
targetPositions[i*3+2]=power*Math.cos(phi)

}

}

function setSphere(){

for(let i=0;i<PARTICLES;i++){

let phi=Math.acos(2*Math.random()-1)
let theta=2*Math.PI*Math.random()

let r=80

targetPositions[i*3]=r*Math.sin(phi)*Math.cos(theta)
targetPositions[i*3+1]=r*Math.sin(phi)*Math.sin(theta)
targetPositions[i*3+2]=r*Math.cos(phi)

}

}

function setGalaxy(){

for(let i=0;i<PARTICLES;i++){

let r=Math.random()*120
let a=r*0.3

targetPositions[i*3]=Math.cos(a)*r
targetPositions[i*3+1]=(Math.random()-0.5)*20
targetPositions[i*3+2]=Math.sin(a)*r

}

}

function setHeart(){

for(let i=0;i<PARTICLES;i++){

let t=Math.random()*Math.PI*2

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

targetPositions[i*3]=x*6
targetPositions[i*3+1]=y*6
targetPositions[i*3+2]=(Math.random()-0.5)*30

}

}

function setTornado(){

for(let i=0;i<PARTICLES;i++){

let h=Math.random()*200
let r=20+h*0.3
let a=h*0.1

targetPositions[i*3]=Math.cos(a)*r
targetPositions[i*3+1]=h-100
targetPositions[i*3+2]=Math.sin(a)*r

}

}

function setWave(){

for(let i=0;i<PARTICLES;i++){

let x=(Math.random()-0.5)*200
let z=(Math.random()-0.5)*200

let y=Math.sin(x*0.1)*30

targetPositions[i*3]=x
targetPositions[i*3+1]=y
targetPositions[i*3+2]=z

}

}

function controlarFigura(dedos){

if(dedos==figura) return

figura=dedos

const msg=document.getElementById("mensaje")

switch(dedos){

case 0:
msg.innerText="💥 Energía liberada"
explosion()
break

case 1:
msg.innerText="Si lo puedes imaginar..."
setSphere()
break

case 2:
msg.innerText="Lo puedes crear."
setGalaxy()
break

case 3:
msg.innerText="Hazlo realidad."
setWave()
break

case 4:
msg.innerText="El universo responde."
setTornado()
break

case 5:
msg.innerText="Todo es energía."
setHeart()
break

}

}

function contarDedos(l){

let dedos=0

if(l[8].y<l[6].y) dedos++
if(l[12].y<l[10].y) dedos++
if(l[16].y<l[14].y) dedos++
if(l[20].y<l[18].y) dedos++

if(l[4].x>l[3].x) dedos++

return dedos

}

function initHands(){

const video=document.getElementById("video")
const debugCanvas=document.getElementById("debugCam")
const ctx=debugCanvas.getContext("2d")

debugCanvas.width=240
debugCanvas.height=180

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(res=>{

ctx.clearRect(0,0,240,180)
ctx.drawImage(res.image,0,0,240,180)

if(res.multiHandLandmarks){

res.multiHandLandmarks.forEach(l=>{

drawConnectors(ctx,l,HAND_CONNECTIONS)
drawLandmarks(ctx,l)

let dedos=contarDedos(l)

controlarFigura(dedos)

handX=(l[9].x-0.5)
handY=(l[9].y-0.5)

})

}

})

const cam=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

cam.start()

}

</script>

</body>
</html>
