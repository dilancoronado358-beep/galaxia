<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo de Partículas 3D</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#mensaje{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:60px;
text-shadow:0 0 30px cyan;
pointer-events:none;
}

video{
display:none;
}

</style>
</head>

<body>

<video id="video" playsinline></video>
<div id="mensaje"></div>

<script>

const PARTICLES=15000

let scene,camera,renderer
let geometry,points
let positions,targetPositions

init()
initHands()
animate()

function init(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=150

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

geometry=new THREE.BufferGeometry()

positions=new Float32Array(PARTICLES*3)
targetPositions=new Float32Array(PARTICLES*3)

for(let i=0;i<PARTICLES;i++){

positions[i*3]=(Math.random()-0.5)*400
positions[i*3+1]=(Math.random()-0.5)*400
positions[i*3+2]=(Math.random()-0.5)*400

targetPositions[i*3]=positions[i*3]
targetPositions[i*3+1]=positions[i*3+1]
targetPositions[i*3+2]=positions[i*3+2]

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

const material=new THREE.PointsMaterial({
size:1.5,
color:0xffffff
})

points=new THREE.Points(geometry,material)
scene.add(points)

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

}

function animate(){

requestAnimationFrame(animate)

for(let i=0;i<PARTICLES*3;i++){

positions[i]+= (targetPositions[i]-positions[i])*0.03

}

geometry.attributes.position.needsUpdate=true

points.rotation.y+=0.002
points.rotation.x+=0.0007

renderer.render(scene,camera)

}

function setSphere(){

for(let i=0;i<PARTICLES;i++){

let phi=Math.acos(2*Math.random()-1)
let theta=2*Math.PI*Math.random()
let r=70

targetPositions[i*3]=r*Math.sin(phi)*Math.cos(theta)
targetPositions[i*3+1]=r*Math.sin(phi)*Math.sin(theta)
targetPositions[i*3+2]=r*Math.cos(phi)

}

}

function setGalaxy(){

for(let i=0;i<PARTICLES;i++){

let r=Math.random()*120
let angle=r*0.25

targetPositions[i*3]=Math.cos(angle)*r
targetPositions[i*3+1]=(Math.random()-0.5)*20
targetPositions[i*3+2]=Math.sin(angle)*r

}

}

function setSpiral(){

for(let i=0;i<PARTICLES;i++){

let t=i*0.15

targetPositions[i*3]=Math.cos(t)*t
targetPositions[i*3+1]=Math.sin(t)*t
targetPositions[i*3+2]=(Math.random()-0.5)*40

}

}

function setHeart(){

for(let i=0;i<PARTICLES;i++){

let t=Math.random()*Math.PI*2

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

targetPositions[i*3]=x*5
targetPositions[i*3+1]=y*5
targetPositions[i*3+2]=(Math.random()-0.5)*30

}

}

function setWave(){

for(let i=0;i<PARTICLES;i++){

let x=(Math.random()-0.5)*200
let z=(Math.random()-0.5)*200

let y=Math.sin(x*0.1)*20

targetPositions[i*3]=x
targetPositions[i*3+1]=y
targetPositions[i*3+2]=z

}

}

function setExplosion(){

for(let i=0;i<PARTICLES;i++){

targetPositions[i*3]=(Math.random()-0.5)*500
targetPositions[i*3+1]=(Math.random()-0.5)*500
targetPositions[i*3+2]=(Math.random()-0.5)*500

}

}

function setTornado(){

for(let i=0;i<PARTICLES;i++){

let h=Math.random()*200
let r=20+h*0.2
let a=h*0.1

targetPositions[i*3]=Math.cos(a)*r
targetPositions[i*3+1]=h-100
targetPositions[i*3+2]=Math.sin(a)*r

}

}

function setCube(){

for(let i=0;i<PARTICLES;i++){

targetPositions[i*3]=(Math.random()-0.5)*120
targetPositions[i*3+1]=(Math.random()-0.5)*120
targetPositions[i*3+2]=(Math.random()-0.5)*120

}

}

function setDNA(){

for(let i=0;i<PARTICLES;i++){

let t=i*0.05

targetPositions[i*3]=Math.cos(t)*30
targetPositions[i*3+1]=t*2-100
targetPositions[i*3+2]=Math.sin(t)*30

}

}

function setMandala(){

for(let i=0;i<PARTICLES;i++){

let angle=(i/PARTICLES)*Math.PI*40
let r=80*Math.sin(angle*0.2)

targetPositions[i*3]=Math.cos(angle)*r
targetPositions[i*3+1]=Math.sin(angle)*r
targetPositions[i*3+2]=Math.sin(angle*2)*20

}

}

function setPortal(){

for(let i=0;i<PARTICLES;i++){

let angle=Math.random()*Math.PI*2
let r=80

targetPositions[i*3]=Math.cos(angle)*r
targetPositions[i*3+1]=Math.sin(angle)*r
targetPositions[i*3+2]=(Math.random()-0.5)*50

}

}

let figura=-1

function controlarFigura(dedos){

if(dedos==figura) return

figura=dedos

const msg=document.getElementById("mensaje")

switch(dedos){

case 0:setExplosion();msg.innerText="Explosión";break
case 1:setSpiral();msg.innerText="Espiral";break
case 2:setSphere();msg.innerText="Esfera";break
case 3:setWave();msg.innerText="Onda";break
case 4:setGalaxy();msg.innerText="Galaxia";break
case 5:setHeart();msg.innerText="Corazón";break
case 6:setDNA();msg.innerText="ADN";break
case 7:setTornado();msg.innerText="Tornado";break
case 8:setCube();msg.innerText="Cubo";break
case 9:setPortal();msg.innerText="Portal";break
default:setMandala();msg.innerText="Mandala"

}

}

function contarDedos(l){

let dedos=0

if(l[8].y<l[6].y) dedos++
if(l[12].y<l[10].y) dedos++
if(l[16].y<l[14].y) dedos++
if(l[20].y<l[18].y) dedos++

if(l[4].x>l[3].x) dedos++

return dedos

}

function initHands(){

const video=document.getElementById("video")

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.8,
minTrackingConfidence:0.8
})

hands.onResults(res=>{

if(res.multiHandLandmarks && res.multiHandLandmarks.length){

let l=res.multiHandLandmarks[0]

let dedos=contarDedos(l)

controlarFigura(dedos)

}

})

const cam=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

cam.start()

}

</script>

</body>
</html>
